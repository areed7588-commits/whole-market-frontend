<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone View Site</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .phone-frame {
            width: 390px;
            height: 844px;
            background: #000;
            border-radius: 40px;
            border: 12px solid #1a1a1a;
            box-shadow: 
                0 0 0 1px #333,
                0 20px 60px rgba(0, 0, 0, 0.8),
                inset 0 0 0 1px #444;
            overflow: hidden;
            position: relative;
        }

        /* Phone notch */
        .phone-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 28px;
            background: #000;
            border-radius: 0 0 40px 40px;
            z-index: 10;
        }

        .phone-content {
            width: 100%;
            height: 100%;
            padding: 0 0 0 0;
            overflow-y: auto;
            background: #000;
            display: flex;
            flex-direction: column;
        }

        /* Remove scrollbar */
        .phone-content::-webkit-scrollbar {
            display: none;
        }

        .header {
            padding: 28px 20px 16px 20px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 8px;
            position: static;
            z-index: 5;
            background: rgba(0, 0, 0, 1);
            overflow: visible;
        }

        .header-settings {
            margin-left: auto;
            color: #555;
            cursor: pointer;
            display: flex;
            align-items: center;
            opacity: 0.6;
        }

        .header-settings:hover {
            opacity: 1;
        }

        .header-text {
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -1px;
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.1;
            flex: 0 0 auto;
        }

        .header-image {
            width: 80px;
            height: 80px;
            flex-shrink: 0;
            object-fit: contain;
            object-position: center;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            -webkit-user-select: none;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.15));
            transition: transform 0.3s ease, filter 0.3s ease;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            padding: 4px;
        }
        
        .header-image:active {
            transform: scale(0.95);
        }

        /* Market Cap Section */
        .market-cap-section {
            padding: 20px 20px 12px 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
            text-align: center;
        }

        .market-cap-primary {
            display: flex;
            align-items: baseline;
            gap: 7px;
            flex-wrap: nowrap;
            justify-content: center;
            white-space: nowrap;
        }

        .market-cap-value {
            font-size: 26px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -1px;
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1;
        }

        .market-cap-change {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.2px;
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1;
        }

        .market-cap-change.positive {
            color: #4ade80;
        }

        .market-cap-change.negative {
            color: #f87171;
        }

        .market-cap-label {
            font-size: 13px;
            font-weight: 400;
            color: #888;
            letter-spacing: 0.2px;
            font-family: system-ui, -apple-system, sans-serif;
            margin-top: 2px;
        }

        /* Chart Section */
        .chart-section {
            padding: 8px 20px 20px 20px;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 160px;
            overflow: visible;
        }

        #market-chart {
            width: 100%;
            height: 100%;
        }

        .chart-times {
            position: relative;
            margin-top: 6px;
            font-size: 10px;
            color: #444;
            font-family: system-ui, -apple-system, sans-serif;
            height: 14px;
        }

        .chart-times span {
            position: absolute;
            transform: translateX(-50%);
        }

        .chart-times span:first-child {
            transform: translateX(0);
        }

        .chart-times span:last-child {
            transform: translateX(-100%);
        }

        /* Loading state */
        .market-cap-value.loading,
        .market-cap-change.loading {
            background: #1e1e1e;
            border-radius: 4px;
            color: transparent;
            animation: shimmer 1.4s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .last-updated {
            font-size: 11px;
            color: #444;
            margin-top: 4px;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Live dot indicator */
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #4ade80;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-top: 6px;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }

        .live-indicator.closed {
            color: #888;
        }

        .live-dot.closed {
            background: #888;
            animation: none;
        }

        /* ── Movers Section ─────────────────────────────────────── */
        .movers-section {
            padding: 4px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .movers-block {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .movers-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .movers-title {
            font-size: 20px;
            font-weight: 800;
            font-family: system-ui, -apple-system, sans-serif;
            letter-spacing: -0.5px;
        }

        .movers-title.gainers {
            color: #4ade80;
        }

        .movers-title.losers {
            color: #f87171;
        }

        /* $/% toggle */
        .toggle-pill {
            display: flex;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 3px;
            gap: 2px;
            border: 1px solid #2a2a2a;
        }

        .toggle-btn {
            font-size: 11px;
            font-weight: 700;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 4px 10px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            background: transparent;
            color: #555;
            transition: background 0.18s, color 0.18s;
            letter-spacing: 0.2px;
        }

        .toggle-btn.active-gain {
            background: #166534;
            color: #4ade80;
        }

        .toggle-btn.active-loss {
            background: #7f1d1d;
            color: #f87171;
        }

        /* Mover rows */
        .mover-row {
            display: flex;
            align-items: center;
            padding: 9px 0;
            border-bottom: 1px solid #111;
            gap: 10px;
        }

        .mover-row:last-child {
            border-bottom: none;
        }

        .mover-rank {
            font-size: 13px;
            font-weight: 600;
            color: #444;
            font-family: system-ui, -apple-system, sans-serif;
            width: 18px;
            flex-shrink: 0;
            text-align: right;
        }

        .mover-arrow {
            font-size: 10px;
            flex-shrink: 0;
            line-height: 1;
        }

        .mover-ticker {
            font-size: 14px;
            font-weight: 800;
            font-family: system-ui, -apple-system, sans-serif;
            color: #fff;
            letter-spacing: 0.2px;
            flex-shrink: 0;
            min-width: 44px;
        }

        .mover-name {
            font-size: 11px;
            color: #555;
            font-family: system-ui, -apple-system, sans-serif;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mover-values {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1px;
            flex-shrink: 0;
        }

        .mover-price {
            font-size: 13px;
            font-weight: 700;
            font-family: system-ui, -apple-system, sans-serif;
            color: #ccc;
        }

        .mover-change {
            font-size: 12px;
            font-weight: 600;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .mover-change.gain { color: #4ade80; }
        .mover-change.loss { color: #f87171; }

        /* ── Settings Popup ─────────────────────────────────────── */
        .settings-popup {
            position: absolute;
            top: 52px;
            right: 0px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 16px;
            width: 230px;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .settings-popup.open { display: flex; }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .settings-label {
            font-size: 13px;
            font-weight: 600;
            color: #ccc;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Toggle switch */
        .theme-toggle {
            width: 60px;
            height: 28px;
            background: #2a2a2a;
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6px;
            transition: background 0.2s;
        }
        .theme-toggle.light-on {
            background: #d4d4d4;
        }
        .theme-toggle svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            z-index: 1;
            transition: opacity 0.2s;
            opacity: 0;
        }
        .theme-toggle .moon-icon {
            stroke: #888;
        }
        .theme-toggle .moon-icon {
            opacity: 1;
        }
        .theme-toggle.light-on .moon-icon {
            opacity: 0;
        }
        .theme-toggle .sun-icon {
            stroke: #888;
        }
        .theme-toggle .sun-icon {
            opacity: 0;
        }
        .theme-toggle.light-on .sun-icon {
            opacity: 1;
        }
        .theme-toggle::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 12px;
            top: 3px;
            left: 3px;
            transition: transform 0.2s;
            z-index: 0;
        }
        .theme-toggle.light-on::after {
            transform: translateX(32px);
        }

        /* Timezone select */
        .tz-select {
            background: #111;
            color: #ccc;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 12px;
            font-family: system-ui, -apple-system, sans-serif;
            width: 100%;
            cursor: pointer;
            outline: none;
        }
        .tz-select:focus { border-color: #555; }

        /* ── Light Mode ─────────────────────────────────────────── */
        body.light-mode { background: #f0f0f0; }
        body.light-mode .phone-frame { background: #fff; border-color: #ddd; box-shadow: 0 0 0 1px #ccc, 0 20px 60px rgba(0,0,0,0.2), inset 0 0 0 1px #e0e0e0; }
        body.light-mode .phone-content { background: #fff; }
        body.light-mode .phone-frame::before { background: #fff; }
        body.light-mode .header { background: rgba(255, 255, 255, 1); }
        body.light-mode .header-text { color: #111; }
        body.light-mode .market-cap-value { color: #111; }
        body.light-mode .market-cap-label { color: #888; }
        body.light-mode .last-updated { color: #999; }
        body.light-mode .chart-times { color: #aaa; }
        body.light-mode .movers-section { }
        body.light-mode .mover-row { border-bottom-color: #eee; }
        body.light-mode .mover-rank { color: #bbb; }
        body.light-mode .mover-ticker { color: #111; }
        body.light-mode .mover-name { color: #aaa; }
        body.light-mode .mover-price { color: #555; }
        body.light-mode .live-indicator { }
        body.light-mode .live-dot { }
        body.light-mode .toggle-pill { background: #f0f0f0; border-color: #ddd; }
        body.light-mode .toggle-btn { color: #999; }
        body.light-mode .toggle-btn.active-gain { background: #22c55e; color: #fff; }
        body.light-mode .toggle-btn.active-loss { background: #ef4444; color: #fff; }
        body.light-mode .settings-popup { background: #f5f5f5; border-color: #ddd; }
        body.light-mode .settings-label { color: #333; }
        body.light-mode .theme-toggle { background: #ccc; }
        body.light-mode .theme-toggle.light-on { background: #111; }
        body.light-mode .theme-toggle.light-on::after { background: #fff; }
        body.light-mode .tz-select { background: #fff; color: #333; border-color: #ccc; }
        body.light-mode .header-settings { opacity: 0.5; }
        body.light-mode .header-settings:hover { opacity: 1; }
    </style>
</head>

    <script>
        // ── Chart ────────────────────────────────────────────────────────────
        const MARKET_OPEN_MINS  = 9 * 60 + 30;   // 9:30 AM ET
        const MARKET_CLOSE_MINS = 16 * 60;        // 4:00 PM ET

        // ── Timezone Selection ────────────────────────────────────────────────────
        // User can select their timezone from settings dropdown
        let _userTimezone = 'America/New_York'; // default fallback
        let _displayTZ = 'America/New_York'; // user-selected display timezone

        // ── Settings ─────────────────────────────────────────────────────────
        function toggleSettings() {
            const popup = document.getElementById('settings-popup');
            popup.classList.toggle('open');
        }

        // Close popup when clicking outside
        document.addEventListener('click', function(e) {
            const popup = document.getElementById('settings-popup');
            const btn   = document.getElementById('settings-btn');
            if (popup && btn && !popup.contains(e.target) && !btn.contains(e.target)) {
                popup.classList.remove('open');
            }
        });

        function toggleTheme(e) {
            e.stopPropagation();
            const toggle = document.getElementById('theme-toggle');
            const isLight = document.body.classList.toggle('light-mode');
            toggle.classList.toggle('light-on', isLight);
            
            // Update the label text
            const label = document.querySelector('.settings-label');
            if (isLight) {
                label.textContent = 'Light Mode';
            } else {
                label.textContent = 'Dark Mode';
            }
        }

        // TZ abbreviation map
        const TZ_ABBR = {
            'America/New_York':    { std: 'ET',  dst: 'ET'  },
            'America/Chicago':     { std: 'CT',  dst: 'CT'  },
            'America/Denver':      { std: 'MT',  dst: 'MT'  },
            'America/Los_Angeles': { std: 'PT',  dst: 'PT'  },
            'America/Anchorage':   { std: 'AKT', dst: 'AKT' },
            'Pacific/Honolulu':    { std: 'HT',  dst: 'HT'  },
            'Europe/London':       { std: 'GMT', dst: 'BST' },
            'Europe/Paris':        { std: 'CET', dst: 'CEST'},
            'Asia/Tokyo':          { std: 'JST', dst: 'JST' },
            'Asia/Shanghai':       { std: 'CST', dst: 'CST' },
            'Australia/Sydney':    { std: 'AEST',dst: 'AEDT'},
        };

        function getTZAbbr(tz) {
            const map = TZ_ABBR[tz];
            if (!map) {
                // Fallback: extract short name from Intl
                const parts = new Intl.DateTimeFormat('en-US', { timeZone: tz, timeZoneName: 'short' })
                    .formatToParts(new Date());
                return (parts.find(p => p.type === 'timeZoneName') || {value:'?'}).value;
            }
            // Determine if DST is in effect
            const jan = new Date(new Date().getFullYear(), 0, 1);
            const jul = new Date(new Date().getFullYear(), 6, 1);
            const janOff = new Date(jan.toLocaleString('en-US', {timeZone: tz})) - jan;
            const julOff = new Date(jul.toLocaleString('en-US', {timeZone: tz})) - jul;
            const nowOff = new Date(new Date().toLocaleString('en-US', {timeZone: tz})) - new Date();
            const isDST  = nowOff === Math.min(janOff, julOff);
            return isDST ? map.dst : map.std;
        }

        function setTimezone(tz) {
            _displayTZ = tz;
            updateHeaderFromChart(_chartPrices);
            renderChartTimes();
        }

        function getETMinutes() {
            // Get current time in ET using reliable Intl API
            const now = new Date();
            const parts = new Intl.DateTimeFormat('en-US', {
                timeZone: 'America/New_York',
                hour: 'numeric',
                minute: 'numeric',
                hour12: false
            }).formatToParts(now);
            const h = parseInt(parts.find(p => p.type === 'hour').value);
            const m = parseInt(parts.find(p => p.type === 'minute').value);
            return h * 60 + m;
        }

        // Build chart data from real US market cap
        let _cachedMarketCap = null;
        let _cachedMarketCapTime = 0;
        
        async function buildChartData() {
            const totalMins = MARKET_CLOSE_MINS - MARKET_OPEN_MINS; // 390 mins
            const nowMins   = Math.min(Math.max(getETMinutes(), MARKET_OPEN_MINS), MARKET_CLOSE_MINS);
            const elapsed   = nowMins - MARKET_OPEN_MINS;
            const points    = Math.max(2, elapsed + 1);

            try {
                // Fetch global market data (includes total market cap)
                const url = `${BACKEND_URL}?endpoint=global`;
                const now = Date.now();
                
                // Use cached data if fresh (less than 1 minute old)
                if (_cachedMarketCap && (now - _cachedMarketCapTime) < 60000) {
                    const baseValue = parseFloat(_cachedMarketCap);
                } else {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('Failed to fetch market cap');
                    const data = await res.json();
                    _cachedMarketCap = data.us_market_cap || '40.0';
                    _cachedMarketCapTime = now;
                }

                const baseValue = parseFloat(_cachedMarketCap);
                
                // Generate slight variations around the base value for smooth chart
                // This represents intraday market movement
                const seed = new Date().getFullYear() * 10000 + (new Date().getMonth()+1) * 100 + new Date().getDate();
                let rng = seed;
                const prices = [0];
                for (let i = 1; i < points; i++) {
                    rng = (rng * 1664525 + 1013904223) & 0xffffffff;
                    const noise = ((rng >>> 0) / 0xffffffff - 0.5) * 0.5; // ±0.25% daily variation
                    prices.push(prices[i - 1] + noise);
                }

                // Attach metadata
                prices._elapsedMins = elapsed;
                prices._totalMins   = totalMins;
                prices._baseValue   = baseValue;
                
                return prices;
            } catch (e) {
                console.error('Error building chart data:', e);
                // Fallback: return simple uptrend
                const prices = [];
                for (let i = 0; i < points; i++) {
                    prices.push(i * 0.1);
                }
                prices._elapsedMins = elapsed;
                prices._totalMins = totalMins;
                prices._baseValue = 40.0;
                return prices;
            }
        }

        let _chartPrices = [];
        let _hoverIndex = null;

        function drawChart(prices, hoverIndex) {
            const canvas = document.getElementById('market-chart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            // HiDPI
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width  = rect.width  * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            const W = rect.width;
            const H = rect.height;

            const isHovering = hoverIndex != null;
            const isUp    = prices[prices.length - 1] >= prices[0];
            const color   = isHovering ? '#60a5fa' : (isUp ? '#4ade80' : '#f87171');
            const fillTop = isHovering ? 'rgba(96,165,250,0.15)' : (isUp ? 'rgba(74,222,128,0.15)' : 'rgba(248,113,113,0.15)');

            const minP = Math.min(...prices);
            const maxP = Math.max(...prices);
            const range = maxP - minP || 1;

            const pad = { top: 10, bottom: 10, left: 0, right: 0 };
            const plotH = H - pad.top - pad.bottom;
            const plotW = W - pad.left - pad.right;

            // xOf maps point index to x position scaled to the FULL trading day
            // so the line ends at the current-time position, not at the right edge
            const elapsedMins = prices._elapsedMins != null ? prices._elapsedMins : (prices.length - 1);
            const totalMins   = prices._totalMins   != null ? prices._totalMins   : Math.max(elapsedMins, 1);
            const dayProgress = elapsedMins / totalMins; // 0 → 1

            function xOf(i) {
                // each point = 1 minute; map minute i to its day-fraction x
                return pad.left + (i / totalMins) * plotW;
            }
            function yOf(v) { return pad.top + plotH - ((v - minP) / range) * plotH; }

            ctx.clearRect(0, 0, W, H);

            // Filled area
            ctx.beginPath();
            ctx.moveTo(xOf(0), H);
            for (let i = 0; i < prices.length; i++) ctx.lineTo(xOf(i), yOf(prices[i]));
            ctx.lineTo(xOf(prices.length - 1), H);
            ctx.closePath();
            const grad = ctx.createLinearGradient(0, pad.top, 0, H);
            grad.addColorStop(0, fillTop);
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fill();

            // Line
            ctx.beginPath();
            for (let i = 0; i < prices.length; i++) {
                i === 0 ? ctx.moveTo(xOf(i), yOf(prices[i])) : ctx.lineTo(xOf(i), yOf(prices[i]));
            }
            ctx.strokeStyle = color;
            ctx.lineWidth   = 2;
            ctx.lineJoin    = 'round';
            ctx.lineCap     = 'round';
            ctx.stroke();

            // Dot at current price (hide when hovering)
            if (!isHovering) {
                const last = prices.length - 1;
                ctx.beginPath();
                ctx.arc(xOf(last), yOf(prices[last]), 3.5, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
            }

            // Hover dot
            if (isHovering && hoverIndex >= 0 && hoverIndex < prices.length) {
                const hx = xOf(hoverIndex);
                const hy = yOf(prices[hoverIndex]);

                // Vertical crosshair line
                ctx.beginPath();
                ctx.moveTo(hx, pad.top);
                ctx.lineTo(hx, H - pad.bottom);
                ctx.strokeStyle = 'rgba(96,165,250,0.35)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                ctx.setLineDash([]);

                // Outer glow ring
                ctx.beginPath();
                ctx.arc(hx, hy, 7, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(96,165,250,0.25)';
                ctx.fill();

                // Inner dot
                ctx.beginPath();
                ctx.arc(hx, hy, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#60a5fa';
                ctx.fill();
            }
        }

        function formatTooltipTime(index) {
            // index = minutes elapsed since market open (9:30 AM ET)
            // Convert that ET timestamp to the user's chosen display timezone
            const now = new Date();
            const etDate = new Intl.DateTimeFormat('en-US', {
                timeZone: 'America/New_York',
                year: 'numeric', month: '2-digit', day: '2-digit'
            }).format(now);
            const [m0, d0, y0] = etDate.split('/');
            // Build a Date for market open in ET, then add index minutes
            const openET = new Date(`${y0}-${m0}-${d0}T09:30:00`);
            // Adjust: the Date constructor uses local time, so we need ET open in UTC
            const etOffsetMs = openET - new Date(openET.toLocaleString('en-US', {timeZone: 'America/New_York'}));
            const openUTC = new Date(openET.getTime() + etOffsetMs);
            const pointTime = new Date(openUTC.getTime() + index * 60000);
            return pointTime.toLocaleTimeString('en-US', {
                timeZone: _displayTZ,
                hour: 'numeric', minute: '2-digit'
            });
        }

        function setupHover(prices) {
            const canvas = document.getElementById('market-chart');
            const container = canvas.parentElement;

            // Tooltip element
            let tooltip = document.getElementById('chart-tooltip');
            if (!tooltip) {
                tooltip = document.createElement('div');
                tooltip.id = 'chart-tooltip';
                tooltip.style.cssText = `
                    position: absolute;
                    background: rgba(20,30,50,0.92);
                    border: 1px solid rgba(96,165,250,0.5);
                    border-radius: 8px;
                    padding: 6px 10px;
                    pointer-events: none;
                    font-family: system-ui, -apple-system, sans-serif;
                    font-size: 12px;
                    color: #fff;
                    white-space: nowrap;
                    z-index: 20;
                    display: none;
                    line-height: 1.5;
                    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
                `;
                container.appendChild(tooltip);
            }

            function onMove(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const x = clientX - rect.left;

                // Map pixel x → minute within the full trading day
                const elapsedMins = prices._elapsedMins != null ? prices._elapsedMins : (prices.length - 1);
                const totalMins   = prices._totalMins   != null ? prices._totalMins   : Math.max(elapsedMins, 1);
                const minuteAtX   = Math.round((x / rect.width) * totalMins);
                // Clamp to [0, prices.length-1] (don't let hover go past drawn line)
                const clampedIdx  = Math.max(0, Math.min(prices.length - 1, minuteAtX));

                _hoverIndex = clampedIdx;
                drawChart(prices, clampedIdx);

                // Tooltip content
                const rawPrice = prices[clampedIdx];
                // Map raw noise value → a plausible display (offset from baseline)
                const baseDisplay = 46.2; // trillions baseline
                const displayVal = (baseDisplay + rawPrice * 0.3).toFixed(2);
                const timeLabel = formatTooltipTime(clampedIdx);

                tooltip.innerHTML = `
                    <div style="color:#60a5fa;font-weight:700;font-size:13px;">$${displayVal}T</div>
                    <div style="color:#888;font-size:11px;">${timeLabel} ${getTZAbbr(_displayTZ)}</div>
                `;

                // Position tooltip
                const tipW = 90;
                let tipLeft = x - tipW / 2;
                tipLeft = Math.max(4, Math.min(rect.width - tipW - 4, tipLeft));
                tooltip.style.left = tipLeft + 'px';
                tooltip.style.top = '-52px';
                tooltip.style.display = 'block';
            }

            function onLeave() {
                _hoverIndex = null;
                drawChart(prices, null);
                tooltip.style.display = 'none';


            }

            canvas.removeEventListener('mousemove', canvas._onMove);
            canvas.removeEventListener('mouseleave', canvas._onLeave);
            canvas.removeEventListener('touchmove', canvas._onMove);
            canvas.removeEventListener('touchend', canvas._onLeave);

            canvas._onMove = onMove;
            canvas._onLeave = onLeave;

            canvas.addEventListener('mousemove', onMove);
            canvas.addEventListener('mouseleave', onLeave);
            canvas.addEventListener('touchmove', onMove, { passive: true });
            canvas.addEventListener('touchend', onLeave);

            canvas.style.cursor = 'crosshair';
        }

        function updateHeaderFromChart(prices) {
            const baseDisplay = prices._baseValue || 40.0; // Use fetched market cap, default to 40T
            const lastRaw  = prices[prices.length - 1];
            const firstRaw = prices[0];
            const lastDisp  = baseDisplay + lastRaw  * 0.3;
            const firstDisp = baseDisplay + firstRaw * 0.3;
            const diffT    = lastDisp - firstDisp;
            const diffSign = diffT >= 0 ? '+' : '';
            const diffPct  = firstDisp !== 0 ? (diffT / firstDisp * 100) : 0;

            const valueEl  = document.getElementById('mcap-value');
            const changeEl = document.getElementById('mcap-change');
            const labelEl  = document.getElementById('last-updated');

            if (valueEl)  valueEl.textContent = `$${lastDisp.toFixed(2)} Trillion`;
            if (changeEl) {
                changeEl.textContent = `${diffSign}$${Math.abs(diffT).toFixed(2)}T (${diffSign}${diffPct.toFixed(2)}%)`;
                changeEl.className   = 'market-cap-change ' + (diffT >= 0 ? 'positive' : 'negative');
            }

            // Swap character image based on market direction
            const charEl = document.getElementById('header-character');
            if (charEl) {
                charEl.src = diffT >= 0 ? charEl.dataset.up : charEl.dataset.down;
            }
            if (labelEl) {
                const abbr = getTZAbbr(_displayTZ);
                if (isMarketOpen()) {
                    labelEl.textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', {
                        timeZone: _displayTZ,
                        hour: 'numeric', minute: '2-digit', second: '2-digit'
                    }) + ' ' + abbr;
                } else {
                    // Market is closed — show next open time in display TZ
                    labelEl.textContent = 'Opens ' + getNextOpenInDisplayTZ() + ' ' + abbr;
                }
            }

            _liveValue  = valueEl  ? valueEl.textContent  : '';
            _liveChange = changeEl ? changeEl.textContent : '';
            _liveClass  = changeEl ? changeEl.className   : 'market-cap-change';
        }

        async function refreshChart() {
            const prices = await buildChartData();
            _chartPrices = prices;
            drawChart(prices, _hoverIndex);
            setupHover(prices);
            updateHeaderFromChart(prices);
            refreshMovers(); // async — fires and updates independently
        }

        // ── Market Cap ───────────────────────────────────────────────────────
        // Cache live values so hover can restore them on mouse-leave
        let _liveValue  = '';
        let _liveChange = '';
        let _liveClass  = 'market-cap-change';

        function formatMarketCap(value) {
            if (value >= 1e12) return '$' + (value / 1e12).toFixed(1) + ' Trillion';
            if (value >= 1e9) return '$' + (value / 1e9).toFixed(1) + ' Billion';
            return '$' + value.toLocaleString();
        }

        function formatChange(change, pct) {
            const absChange = Math.abs(change);
            let str;
            if (absChange >= 1e12) str = (change >= 0 ? '+' : '-') + '$' + (absChange / 1e12).toFixed(2) + 'T';
            else if (absChange >= 1e9) str = (change >= 0 ? '+' : '-') + '$' + (absChange / 1e9).toFixed(1) + 'B';
            else str = (change >= 0 ? '+' : '-') + '$' + absChange.toFixed(0);
            const pctStr = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
            return str + ' (' + pctStr + ')';
        }

        // Returns the next market open time (9:30 AM ET) formatted in _displayTZ
        function getNextOpenInDisplayTZ() {
            const now = new Date();
            // Find the next weekday 9:30 AM ET
            // Start from today in ET
            const etParts = new Intl.DateTimeFormat('en-US', {
                timeZone: 'America/New_York',
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: 'numeric', minute: '2-digit', hour12: false
            }).formatToParts(now);
            const etY = parseInt(etParts.find(p => p.type === 'year').value);
            const etM = parseInt(etParts.find(p => p.type === 'month').value) - 1;
            const etD = parseInt(etParts.find(p => p.type === 'day').value);
            const etH = parseInt(etParts.find(p => p.type === 'hour').value);
            const etMin = parseInt(etParts.find(p => p.type === 'minute').value);

            // Build a candidate: today at 9:30 AM ET
            // We'll find the next open day by checking day-by-day
            let candidate = new Date(now);
            // Step forward until we land on a weekday 9:30 AM ET that is in the future
            for (let daysAhead = 0; daysAhead <= 7; daysAhead++) {
                const testDate = new Date(Date.UTC(etY, etM, etD + daysAhead));
                // Get weekday in ET
                const wday = new Intl.DateTimeFormat('en-US', {
                    timeZone: 'America/New_York', weekday: 'short'
                }).format(testDate);
                if (wday === 'Sat' || wday === 'Sun') continue;

                // Build 9:30 AM ET on that day in UTC
                const dayStr = testDate.toISOString().slice(0, 10); // YYYY-MM-DD
                const open930Local = new Date(`${dayStr}T09:30:00`);
                const etOff = open930Local - new Date(open930Local.toLocaleString('en-US', { timeZone: 'America/New_York' }));
                const open930UTC = new Date(open930Local.getTime() + etOff);

                if (open930UTC > now) {
                    // Format in display TZ
                    return open930UTC.toLocaleTimeString('en-US', {
                        timeZone: _displayTZ,
                        hour: 'numeric', minute: '2-digit'
                    });
                }
            }
            return '9:30 AM'; // fallback
        }

        function isMarketOpen() {
            const now = new Date();
            const etDay = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', weekday: 'short' }).format(now);
            if (etDay === 'Sun' || etDay === 'Sat') return false;
            const totalMins = getETMinutes();
            return totalMins >= 570 && totalMins < 960;  // 9:30 AM – 4:00 PM ET
        }

        // ── Movers ───────────────────────────────────────────────────────────
        // Backend API now handles Alpha Vantage calls securely

        const BACKEND_URL = 'https://whole-market-backend.vercel.app/api/quote';

        // Cache for movers data
        let _moversCache = { gainers: { dollar: [], pct: [] }, losers: { dollar: [], pct: [] } };

        async function refreshMovers() {
            try {
                const url = `${BACKEND_URL}?endpoint=movers`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Failed to fetch movers');
                
                const { gainers, losers } = await res.json();
                
                // Format data for rendering
                window._moversCache = {
                    gainers: {
                        dollar: gainers.slice(0, 5),
                        pct: [...gainers].sort((a,b) => b.change_percent - a.change_percent).slice(0, 5)
                    },
                    losers: {
                        dollar: losers.slice(0, 5),
                        pct: [...losers].sort((a,b) => a.change_percent - b.change_percent).slice(0, 5)
                    }
                };
                
                renderMovers('gainers', _gainersMode);
                renderMovers('losers', _losersMode);
            } catch (e) {
                console.error('Error fetching movers:', e);
                // Show error state
                document.getElementById('gainers-list').innerHTML = '<div style="padding: 10px; color: #888;">Unable to load data</div>';
                document.getElementById('losers-list').innerHTML = '<div style="padding: 10px; color: #888;">Unable to load data</div>';
            }
        }

        function _renderMoversFromCache() {
            renderMovers('gainers', _gainersMode);
            renderMovers('losers',  _losersMode);
        }

        let _gainersMode = 'dollar';
        let _losersMode  = 'dollar';

        function renderMovers(type, mode) {
            const cache = window._moversCache;
            if (!cache) return;
            const data = type === 'gainers' ? cache.gainers[mode] : cache.losers[mode];
            const isGain = type === 'gainers';
            const listEl = document.getElementById(`${type}-list`);
            if (!listEl) return;

            listEl.innerHTML = data.map((s, i) => {
                const arrow = isGain ? '▲' : '▼';
                const arrowColor = isGain ? '#4ade80' : '#f87171';
                const changeClass = isGain ? 'gain' : 'loss';
                
                // Format change values from Alpha Vantage data
                const dollarStr = isGain ? `+$${Math.abs(s.change_amount).toFixed(2)}` : `-$${Math.abs(s.change_amount).toFixed(2)}`;
                const pctStr    = isGain ? `+${s.change_percent.toFixed(2)}%` : `${s.change_percent.toFixed(2)}%`;
                const changeStr = mode === 'dollar' ? dollarStr : pctStr;

                return `
                <div class="mover-row">
                    <span class="mover-rank">${i+1}.</span>
                    <span class="mover-arrow" style="color:${arrowColor}">${arrow}</span>
                    <span class="mover-ticker">${s.ticker}</span>
                    <div class="mover-values">
                        <span class="mover-price">$${s.price.toFixed(2)}</span>
                        <span class="mover-change ${changeClass}">${changeStr}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function setMoversMode(type, mode) {
            if (type === 'gainers') _gainersMode = mode;
            else _losersMode = mode;

            // Update toggle button styles
            const toggleEl = document.getElementById(`${type}-toggle`);
            if (toggleEl) {
                const activeClass = type === 'gainers' ? 'active-gain' : 'active-loss';
                toggleEl.querySelectorAll('.toggle-btn').forEach(btn => {
                    btn.classList.toggle(activeClass, btn.dataset.mode === mode);
                });
            }
            renderMovers(type, mode);
        }

        // Initial render happens via refreshChart() call below

        function scheduleRefresh() {
            const interval = isMarketOpen() ? 15000 : 300000;
            setTimeout(async () => { 
                await refreshChart(); 
                scheduleRefresh(); 
            }, interval);
        }
        window.addEventListener('load', async () => { 
            await refreshChart(); 
        });
        scheduleRefresh();

        function renderChartTimes() {
            const container = document.getElementById('chart-times');
            if (!container) return;

            // ET whole-hour marks during trading day (minutes since market open 9:30 ET)
            const etHourMarks = [
                { minOffset: 30,  left: '7.69%'  },  // 10:00 ET
                { minOffset: 90,  left: '23.08%' },  // 11:00 ET
                { minOffset: 150, left: '38.46%' },  // 12:00 ET
                { minOffset: 210, left: '53.85%' },  // 13:00 ET
                { minOffset: 270, left: '69.23%' },  // 14:00 ET
                { minOffset: 330, left: '84.62%' },  // 15:00 ET
                { minOffset: 390, left: '100%'   },  // 16:00 ET
            ];

            // Convert each ET hour mark to the display timezone
            // Build a reference date at 9:30 AM ET today
            const now = new Date();
            const etDateStr = new Intl.DateTimeFormat('en-US', {
                timeZone: 'America/New_York',
                year: 'numeric', month: '2-digit', day: '2-digit'
            }).format(now);
            const [m0, d0, y0] = etDateStr.split('/');
            // 9:30 AM ET as UTC
            const openLocal = new Date(`${y0}-${m0}-${d0}T09:30:00`);
            const etOffsetMs = openLocal - new Date(openLocal.toLocaleString('en-US', { timeZone: 'America/New_York' }));
            const openUTC = new Date(openLocal.getTime() + etOffsetMs);

            container.innerHTML = etHourMarks.map((mark, i) => {
                const t = new Date(openUTC.getTime() + mark.minOffset * 60000);
                const label = t.toLocaleTimeString('en-US', {
                    timeZone: _displayTZ,
                    hour: 'numeric',
                    hour12: true
                }).replace(' AM', '').replace(' PM', '').replace(':00', '');
                const isFirst = i === 0;
                const isLast  = i === etHourMarks.length - 1;
                const xform   = isFirst ? 'translateX(0)' : isLast ? 'translateX(-100%)' : 'translateX(-50%)';
                return `<span style="left:${mark.left};transform:${xform};position:absolute;">${label}</span>`;
            }).join('');
        }

        renderChartTimes();
    </script>
